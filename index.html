<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Talks Event Schedule</title>
    <!-- Placeholder for CSS -->
    <style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background-color: #f4f4f4;
    color: #333;
}

header {
    background-color: #333;
    color: #fff;
    padding: 1em 0;
    text-align: center;
}

h1 {
    margin: 0;
}

main {
    padding: 20px;
    max-width: 900px;
    margin: 20px auto;
    background-color: #fff;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
}

.schedule-filter {
    margin-bottom: 20px;
    text-align: center;
}

#categorySearch {
    padding: 10px;
    width: 80%;
    max-width: 400px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 1em;
}

.schedule-item {
    background-color: #f9f9f9;
    border: 1px solid #eee;
    margin-bottom: 15px;
    padding: 15px;
    border-radius: 5px;
}

.schedule-item.talk {
    border-left: 5px solid #007bff;
}

.schedule-item.break {
    background-color: #e9ecef;
    border-left: 5px solid #6c757d;
    text-align: center;
}

.schedule-item h2 {
    margin-top: 0;
    color: #007bff;
}

.schedule-item.break h2 {
    color: #6c757d;
}

.schedule-item p {
    margin: 5px 0;
}

.schedule-item .time {
    font-weight: bold;
    color: #555;
}

.schedule-item .speakers,
.schedule-item .category {
    font-size: 0.9em;
    color: #666;
}

.schedule-item .category span {
    display: inline-block;
    background-color: #e0f7fa;
    color: #007bff;
    padding: 3px 8px;
    border-radius: 3px;
    margin-right: 5px;
    margin-bottom: 5px;
}

footer {
    text-align: center;
    padding: 20px;
    margin-top: 30px;
    background-color: #333;
    color: #fff;
    font-size: 0.9em;
}

/* Responsive adjustments */
@media (max-width: 600px) {
    main {
        margin: 10px;
        padding: 15px;
    }
    #categorySearch {
        width: 95%;
    }
}
</style>
</head>
<body>
    <header>
        <h1>Tech Talks Event</h1>
        <p>A day of insightful technical discussions.</p>
    </header>

    <main>
        <section class="schedule-filter">
            <input type="text" id="categorySearch" placeholder="Search by category...">
        </section>
        <section id="schedule-container" class="schedule-container">
            <!-- Dynamic schedule content will be injected here -->
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Tech Talks Event</p>
    </footer>

    <!-- Placeholder for JavaScript -->
    <script id="eventDataJson" type="application/json">[
  {
    "type": "talk",
    "time": "10:00 AM - 11:00 AM",
    "title": "Introduction to AI in Software Development",
    "speakers": ["Alice Johnson"],
    "category": ["AI", "Software Engineering"],
    "duration": "1 hour",
    "description": "An overview of how AI is transforming various aspects of software development, from code generation to automated testing."
  },
  {
    "type": "talk",
    "time": "11:10 AM - 12:10 PM",
    "title": "Cloud-Native Architectures with Kubernetes",
    "speakers": ["Bob Williams", "Carol Davis"],
    "category": ["Cloud", "DevOps", "Kubernetes"],
    "duration": "1 hour",
    "description": "Deep dive into designing and deploying resilient, scalable applications using cloud-native patterns and Kubernetes."
  },
  {
    "type": "break",
    "time": "12:20 PM - 1:20 PM",
    "title": "Lunch Break",
    "description": "Enjoy a delicious lunch and network with fellow attendees!"
  },
  {
    "type": "talk",
    "time": "1:30 PM - 2:30 PM",
    "title": "Frontend Performance Optimization Techniques",
    "speakers": ["David Lee"],
    "category": ["Frontend", "Web Development", "Performance"],
    "duration": "1 hour",
    "description": "Explore advanced techniques to boost your web application's performance, focusing on JavaScript, CSS, and asset loading."
  },
  {
    "type": "talk",
    "time": "2:40 PM - 3:40 PM",
    "title": "Secure Coding Practices for Modern Applications",
    "speakers": ["Eve Miller"],
    "category": ["Security", "Software Engineering"],
    "duration": "1 hour",
    "description": "Learn essential secure coding practices to protect your applications from common vulnerabilities and threats."
  },
  {
    "type": "talk",
    "time": "3:50 PM - 4:50 PM",
    "title": "Data Science with Python and Pandas",
    "speakers": ["Frank White", "Grace Green"],
    "category": ["Data Science", "Python", "Machine Learning"],
    "duration": "1 hour",
    "description": "A practical session on using Python and the Pandas library for data manipulation, analysis, and visualization."
  },
  {
    "type": "talk",
    "time": "5:00 PM - 6:00 PM",
    "title": "The Future of WebAssembly in the Browser and Beyond",
    "speakers": ["Heidi Black"],
    "category": ["Web Development", "WebAssembly", "Emerging Tech"],
    "duration": "1 hour",
    "description": "Discover the potential of WebAssembly as it expands beyond the browser into new frontiers like server-side and edge computing."
  }
]
</script><script>
document.addEventListener('DOMContentLoaded', () => {
    const eventData = JSON.parse(document.getElementById('eventDataJson').textContent);
    const scheduleContainer = document.getElementById('schedule-container');
    const categorySearch = document.getElementById('categorySearch');

    function renderSchedule(data) {
        scheduleContainer.innerHTML = ''; // Clear previous entries
        data.forEach(item => {
            const itemElement = document.createElement('div');
            itemElement.classList.add('schedule-item', item.type);

            let content = '<p class="time">' + item.time + '</p>';
            content += '<h2>' + item.title + '</h2>';

            if (item.type === 'talk') {
                content += '<p class="speakers"><strong>Speakers:</strong> ' + item.speakers.join(', ') + '</p>';
                content += '<p class="category"><strong>Category:</strong> ' + item.category.map(cat => '<span>' + cat + '</span>').join('') + '</p>';
                content += '<p class="description">' + item.description + '</p>';
            } else if (item.type === 'break') {
                content += '<p class="description">' + item.description + '</p>';
            }
            itemElement.innerHTML = content;
            scheduleContainer.appendChild(itemElement);
        });
    }

    function filterSchedule() {
        const searchTerm = categorySearch.value.toLowerCase();
        const filteredData = eventData.filter(item => {
            if (item.type === 'talk' && item.category) {
                return item.category.some(cat => cat.toLowerCase().includes(searchTerm));
            }
            return true; // Always show breaks
        });
        renderSchedule(filteredData);
    }

    // Initial render
    renderSchedule(eventData);

    // Add event listener for search
    categorySearch.addEventListener('keyup', filterSchedule);
    categorySearch.addEventListener('change', filterSchedule); // For clearing input with mouse
});
</script>
</body>
</html>
